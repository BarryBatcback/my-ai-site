<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div class="theme-toggle">
        <button id="themeSwitcher" aria-label="Переключить тему">
            <span class="light-icon">☀️</span>
            <span class="dark-icon">🌙</span>
        </button>
    </div>

    <main class="container">
        <div class="chat-container">
            <div class="chat-header">
                <h1>AI Assistant</h1>
                <p class="subtitle">Ваш персональный помощник</p>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="message-content">
                        Здравствуйте! Чем я могу вам помочь?
                    </div>
                </div>
            </div>

            <div class="chat-input-container">
                <textarea 
                    id="userInput" 
                    placeholder="Введите ваш вопрос..." 
                    rows="1"
                ></textarea>
                <button id="sendButton" class="send-btn">
                    <span>➤</span>
                </button>
            </div>
        </div>
    </main>
    <div class="settings-panel" id="settingsPanel">
    <h3>Настройки AI</h3>
    <div class="setting-item">
        <label>Температура (креативность)</label>
        <input type="range" id="temperature" min="0" max="1" step="0.1" value="0.7">
        <span id="tempValue">0.7</span>
    </div>
    <div class="setting-item">
        <label>Макс. длина ответа</label>
        <input type="number" id="maxTokens" value="500" min="100" max="2000">
    </div>
    <div class="setting-item">
        <label>Стиль общения</label>
        <select id="aiStyle">
            <option value="professional">Профессиональный</option>
            <option value="friendly">Дружелюбный</option>
            <option value="creative">Творческий</option>
        </select>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
